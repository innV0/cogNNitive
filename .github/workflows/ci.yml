name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core package
        run: npm --prefix packages/innfo-core run build

      - name: Lint
        run: npm run lint

      # Formatting is adopted in ratchet mode: the whole repo is not yet
      # Prettier-clean, so we only check files changed in the PR rather than
      # gating on a repo-wide reformat. Run `npm run format` locally on touch.
      - name: Format check (changed files)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD \
            -- '*.ts' '*.mts' '*.vue' '*.js' '*.mjs' '*.json' | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then
            npx prettier --check --ignore-unknown $CHANGED
          else
            echo "No formattable files changed."
          fi

      - name: Typecheck (app)
        run: npm --prefix apps/innfo-editor run typecheck

      - name: Unit tests (core)
        run: npm --prefix packages/innfo-core test

      - name: Unit tests (app)
        run: npm --prefix apps/innfo-editor test

      - name: Build app
        run: npm --prefix apps/innfo-editor run build

schema:
  required_fields: [id, nombre, año, descripcion, eventos]
  fields:
    id: { type: string, pattern: "^timeline-\\d{4}[a-z]?$" }
    nombre: { type: string }
    año: { type: integer }
    descripcion: { type: string }
    eventos:
      type: array
      items:
        type: object
        properties:
          fecha: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$" }
          evento: { type: string }
          tipo: { type: string, enum: [viaje, alteracion, correccion, paradoja, evento-clave] }
        required: [fecha, evento, tipo]
    paradojas: { type: array, items: { type: string } }
    activo: { type: boolean, default: false }
